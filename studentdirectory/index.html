    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        :root {
            --chec-maroon: #7E0101;
            --chec-dark-maroon: #2D0C0C;
            --chec-bg-light: #F8FAFC;
            --chec-border: #DBD8D8;
            --chec-text-dark: #2E2E2E;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--chec-bg-light);
            color: var(--chec-text-dark);
        }

        .section-pill {
            background-color: var(--chec-maroon);
            color: white;
            border-radius: 50px;
            padding: 12px 28px;
            display: inline-block;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(126, 1, 1, 0.2);
        }

        .student-card {
            background: white;
            border: 1.5px solid var(--chec-border);
            border-radius: 2.5rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .student-card:hover {
            border-color: var(--chec-maroon);
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
        }

        /* Fixed Image size logic */
        .profile-img-container {
            width: 130px;
            height: 130px;
            min-width: 130px; /* Prevents shrinking */
            min-height: 130px; /* Prevents shrinking */
            flex-shrink: 0;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--chec-maroon);
            object-fit: cover;
            background-color: #f1f5f9;
        }

        .tag-pill {
            background-color: #f8fafc;
            border: 1px solid var(--chec-border);
            color: var(--chec-maroon);
            font-weight: 700;
            font-size: 0.65rem;
        }

        .detail-label {
            color: var(--chec-maroon);
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
            display: block;
        }

        #copy-toast.active {
            opacity: 1;
            transform: translate(-50%, -10px);
        }
    </style>
</head>

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('copy-toast');
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 2000);
        });
    }

    // Making this globally accessible for the onclick events
    window.copyToClipboard = copyToClipboard;

    function createCard(person, isPhd = false) {
    const subtitle = isPhd ? "PhD Scholar" : person.program;
    const mainWorkLabel = isPhd ? "Research Topic" : "Projects";
    const mainWorkValue = isPhd ? person.research_topic : person.project_title;
    const tags = isPhd ? (person.expertise_keywords || []) : (person.skills || []);
    
    // Check if supervisor exists and is valid
    const hasSupervisor = person.supervisor && 
                          person.supervisor !== null && 
                          !['null', 'na', '', 'none'].includes(person.supervisor.toString().toLowerCase().trim());

    // Clean check for achievements
    const hasAchievements = person.achievements && 
                            person.achievements !== null && 
                            !['null', 'na', 'not yet.', ''].includes(person.achievements.toString().toLowerCase().trim());

    // Clean check for resume
    const hasResume = person.resume && 
                      person.resume !== null && 
                      person.resume.trim() !== "" && 
                      person.resume !== "null";

    return `
        <div class="student-card p-8 md:p-10 relative">
            <div class="absolute top-6 right-6 group/menu z-20 pb-4 pr-4"> 
                <button class="text-slate-300 hover:text-[#7E0101] transition-colors p-2">
                    <i data-lucide="more-horizontal" class="w-6 h-6"></i>
                </button>
                <div class="hidden group-hover/menu:block absolute right-4 top-[80%] bg-white shadow-xl border border-slate-100 rounded-xl py-2 w-40 z-50">
                    <a href="YOUR_GOOGLE_FORM_LINK" target="_blank" class="block px-5 py-3 text-[10px] font-bold text-slate-500 hover:bg-slate-50 hover:text-[#7E0101] uppercase tracking-widest">
                        Request Edit
                    </a>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-8 items-center md:items-start mb-8">
                <div class="profile-img-container">
                    <img src="${person.photo}" alt="${person.name}" onerror="this.src='https://via.placeholder.com/150'" class="profile-img">
                </div>
                <div class="flex-grow text-center md:text-left">
                    <h3 class="text-2xl font-bold text-[#7E0101] leading-tight uppercase tracking-tight">${person.name}</h3>
                    <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.15em] mt-1">${subtitle}</p>
                    <div class="flex flex-wrap justify-center md:justify-start gap-2 mt-4">
                        ${tags.slice(0, 6).map(tag => `<span class="tag-pill px-2.5 py-1 rounded-md uppercase">${tag}</span>`).join('')}
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8 flex-grow">
                <div class="space-y-5">
                    <div>
                        <span class="detail-label">${mainWorkLabel}</span>
                        <p class="text-sm text-slate-800 font-semibold leading-snug">${mainWorkValue || 'Project details pending'}</p>
                    </div>
                    
                    ${hasSupervisor ? `
                        <div>
                            <span class="detail-label">Supervisor</span>
                            <p class="text-xs text-slate-500 font-medium">${person.supervisor}</p>
                        </div>
                    ` : ''}
                </div>
                
                <div class="border-l border-slate-100 pl-0 md:pl-6">
                    ${hasAchievements ? `
                        <span class="detail-label">Achievements & Experience</span>
                        <div class="text-[11px] text-slate-600 leading-relaxed font-medium">
                            ${person.achievements.replace(/\n/g, '<br>')}
                        </div>
                    ` : ''}
                </div>
            </div>

            <div class="pt-6 border-t border-slate-100 flex items-center justify-between mt-auto">
                <div class="flex gap-3">
                    <div class="group/contact relative">
                        <button class="p-3 rounded-xl bg-slate-50 text-slate-400 group-hover/contact:bg-[#7E0101] group-hover/contact:text-white transition-all shadow-sm">
                            <i data-lucide="contact" class="w-5 h-5"></i>
                        </button>
                        
                        <div class="hidden group-hover/contact:block absolute bottom-[85%] left-0 pb-6 w-72 z-[60]">
                            <div class="bg-white p-6 rounded-2xl shadow-2xl border border-slate-100">
                                <p class="text-[9px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Direct Contact</p>
                                <div class="space-y-4">
                                    <div class="flex justify-between items-center text-xs gap-4">
                                        <span class="text-slate-800 font-semibold truncate">${person.email}</span>
                                        <button onclick="window.copyToClipboard('${person.email}')" class="text-[#7E0101] font-bold hover:underline shrink-0">Copy</button>
                                    </div>
                                    <div class="flex justify-between items-center text-xs">
                                        <span class="text-slate-800 font-semibold">${person.contact || person.phone || 'N/A'}</span>
                                        <button onclick="window.copyToClipboard('${person.contact || person.phone}')" class="text-[#7E0101] font-bold hover:underline shrink-0">Copy</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <a href="${person.linkedin}" target="_blank" class="p-3 rounded-xl bg-slate-50 text-slate-400 hover:bg-[#0077b5] hover:text-white transition-all shadow-sm">
                        <i data-lucide="linkedin" class="w-5 h-5"></i>
                    </a>
                </div>

                ${hasResume ? `
                    <a href="${person.resume}" target="_blank" class="bg-[#7E0101] text-white px-10 py-3.5 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-[#2D0C0C] transition-all shadow-md">
                        Resume
                    </a>
                ` : ''}
            </div>
        </div>
    `;
}

    function render(filter = "") {
        const gradGrid = document.getElementById('gradGrid');
        const phdGrid = document.getElementById('phdGrid');
        
        const filteredStudents = talentDirectory.students.filter(s => 
            s.name.toLowerCase().includes(filter) || 
            (s.skills && s.skills.some(sk => sk.toLowerCase().includes(filter))) ||
            (s.program && s.program.toLowerCase().includes(filter))
        );

        const filteredPhds = talentDirectory.phd_scholars.filter(p => 
            p.name.toLowerCase().includes(filter) || 
            (p.expertise_keywords && p.expertise_keywords.some(ex => ex.toLowerCase().includes(filter)))
        );

        gradGrid.innerHTML = filteredStudents.map(s => createCard(s, false)).join('');
        phdGrid.innerHTML = filteredPhds.map(p => createCard(p, true)).join('');
        
        lucide.createIcons();
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        render(e.target.value.toLowerCase());
    });

    // Initial render
    render();
</script>
</body>
</html>
