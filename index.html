<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Talent Directory | IIT Tirupati</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #e2e8f0;
            background-image:
                    radial-gradient(at 0% 0%, #f1f5f9 0, transparent 50%),
                    radial-gradient(at 100% 100%, #cbd5e1 0, transparent 50%);
            min-height: 100vh;
        }

        .student-card {
            background: linear-gradient(145deg, #f8fafc 0%, #f1f5f9 50%, #ffffff 100%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 10px 10px 30px #d1d5db, -10px -10px 30px #ffffff;
            transition: all 0.4s ease;
        }

        .student-card:hover {
            transform: translateY(-10px);
            background: linear-gradient(145deg, #eff6ff 0%, #f8fafc 100%);
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
        }

        #searchInput {
            outline: none !important;
            box-shadow: none !important;
        }

        .search-container:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .menu-wrapper {
            position: relative;
            padding-bottom: 25px;
            margin-bottom: -25px;
        }

        .dropdown-panel {
            visibility: hidden;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.2s ease;
        }

        .menu-wrapper:hover .dropdown-panel {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        #copy-toast {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #copy-toast.active {
            opacity: 1;
            transform: translate(-50%, -20px);
        }
    </style>
</head>
<body class="p-8 md:p-20">

<header class="max-w-4xl mx-auto text-center mb-20">
    <h1 class="text-5xl font-extrabold text-slate-900 tracking-tight mb-4">Student Talent Directory</h1>
    <p class="text-slate-500 text-lg">Connecting industry leaders with the next generation of Chemical Engineers.</p>

    <div class="mt-10 max-w-lg mx-auto relative">
        <div class="search-container bg-white/80 backdrop-blur-lg rounded-2xl flex items-center px-4 py-1 border border-white transition-all">
            <i data-lucide="search" class="text-slate-400 w-5 h-5 ml-2"></i>
            <input type="text" id="searchInput" placeholder="Search key area interests..."
                   class="w-full bg-transparent border-none py-4 px-3 text-slate-700 font-medium">
        </div>
    </div>
</header>

<main id="directoryGrid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
</main>

<div id="copy-toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl text-sm font-bold opacity-0 transition-all pointer-events-none shadow-2xl flex items-center gap-2 z-[100]">
    <i data-lucide="check" class="w-4 h-4 text-emerald-400"></i> Copied
</div>

<script>
    const students = [
        {
            id: "001",
            name: "LIAM CHEN",
            year: "2 Year MTech | Chemical Eng",
            tags: ["Bioreaction Eng", "Pharmacology", "Bioinformatics"],
            bio: "Seeking summer internships in biotech/pharma R&D. [cite: 17, 22]",
            email: "abc123@gmail.com",
            phone: "+91 9876543210"
        },
        {
            id: "002",
            name: "ANANYA RAO",
            year: "Ph.D Scholar | Catalysis",
            tags: ["Kinetics", "Nanomaterials", "Energy"],
            bio: "Focusing on industrial catalysis and green hydrogen production research.",
            email: "ananya.r@iittp.ac.in",
            phone: "+91 8887776665"
        }
    ];

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('copy-toast');
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 2000);
        });
    }

    function render(data) {
        const grid = document.getElementById('directoryGrid');
        grid.innerHTML = data.map(s => `
                <div class="student-card rounded-[3rem] p-10 flex flex-col h-full relative">

                    <div class="absolute top-10 right-10 z-50">
                        <div class="menu-wrapper">
                            <button class="p-2 rounded-xl hover:bg-white text-slate-400 transition-colors">
                                <i data-lucide="more-horizontal" class="w-6 h-6"></i>
                            </button>
                            <div class="dropdown-panel absolute right-0 top-full mt-2 w-48 bg-white shadow-2xl rounded-2xl py-2 border border-slate-100">
                                <a href="Put the Google Form link here bro" target="_blank" class="block px-5 py-3 text-[10px] font-bold text-slate-600 hover:text-blue-600 uppercase tracking-widest">
                                    Request Edit
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="mb-8">
                        <h2 class="text-2xl font-bold text-slate-900 tracking-tight leading-none mb-2 uppercase">${s.name}</h2>
                        <p class="text-blue-600 text-[11px] font-black uppercase tracking-widest">${s.year}</p>
                    </div>

                    <div class="flex flex-wrap gap-2 mb-8">
                        ${s.tags.map(tag => `<span class="bg-white/50 border border-slate-200 px-3 py-1.5 text-slate-500 text-[10px] font-bold rounded-xl uppercase tracking-tight">[${tag}]</span>`).join('')}
                    </div>

                    <p class="text-slate-600 text-sm leading-relaxed mb-12 flex-grow font-medium">
                        ${s.bio}
                    </p>

                    <div class="pt-8 border-t border-slate-200">
                        <div class="flex items-center justify-between mb-8 group relative">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Contact Info</span>
                            <div class="flex gap-2">
                                <button class="p-3 bg-white hover:bg-blue-600 hover:text-white text-slate-400 rounded-2xl transition-all shadow-sm">
                                    <i data-lucide="mail" class="w-4 h-4"></i>
                                </button>
                                <button class="p-3 bg-white hover:bg-blue-600 hover:text-white text-slate-400 rounded-2xl transition-all shadow-sm">
                                    <i data-lucide="phone" class="w-4 h-4"></i>
                                </button>
                            </div>

                            <div class="hidden group-hover:block absolute bottom-full right-0 mb-4 w-64 bg-white p-6 rounded-3xl shadow-2xl text-[11px] border border-slate-50 z-[60]">
                                <p class="text-slate-400 font-bold uppercase mb-4 text-[9px]">Direct Contact</p>

                                <div class="flex justify-between items-center mb-3">
                                    <span class="text-slate-800 font-semibold truncate mr-4">${s.email}</span>
                                    <button onclick="copyToClipboard('${s.email}')" class="text-blue-600 font-bold hover:underline">Copy</button>
                                </div>

                                <div class="flex justify-between items-center">
                                    <span class="text-slate-800 font-semibold">${s.phone}</span>
                                    <button onclick="copyToClipboard('${s.phone}')" class="text-blue-600 font-bold hover:underline">Copy</button>
                                </div>
                            </div>
                        </div>

                        <div class="flex gap-4">
                            <a href="#" class="flex-1 bg-slate-900 text-white text-center py-4 text-[11px] font-bold rounded-2xl hover:bg-blue-700 transition-all tracking-widest uppercase shadow-lg shadow-slate-300">
                                View Resume
                            </a>
                            <a href="#" class="p-4 bg-white border border-slate-100 rounded-2xl hover:text-blue-600 text-slate-400 shadow-sm transition-colors">
                                <i data-lucide="linkedin" class="w-5 h-5"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        lucide.createIcons();
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        render(students.filter(s =>
            s.name.toLowerCase().includes(val) ||
            s.tags.some(t => t.toLowerCase().includes(val))
        ));
    });

    render(students);
</script>
</body>
</html>
